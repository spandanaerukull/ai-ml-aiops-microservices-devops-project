grafana:
  enabled: true
  adminPassword: prom-operator
  service:
    type: ClusterIP

prometheus:
  prometheusSpec:
    retention: 7d
    scrapeInterval: 30s

alertmanager:
  enabled: true

  grafana:
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki.monitoring.svc.cluster.local:3100
      isDefault: false